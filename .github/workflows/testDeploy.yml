name: test-and-deploy
on: [push, pull_request]
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    name: Run unit tests with Python ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
      - name: Install bashi
        run: |
          pip install .
      - name: run unit tests
        run: python -m unittest discover -s tests -p "*.py"
  integration-tests:
    needs: unit-tests
    runs-on: ubuntu-latest
    name: Run example/example.py as integration test
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: 3.14
          architecture: x64
      - name: Install bashi
        run: |
          pip install .
      - name: run integration test
        run: python example/example.py
      - name: copy example output for reproducible test
        run: mv example/job.yaml example/first.yaml
      - name: run example second time
        run: python example/example.py
      - name: compare result of example runs (should be equal)
        run: diff example/job.yaml example/first.yaml
  deploy:
    runs-on: ubuntu-latest
    name: Build pip package and upload it
    needs: integration-tests
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: 3.14
          architecture: x64
      - name: install requirements
        run: |
          python -m pip install --upgrade pip
          python3 -m pip install --upgrade build
          python3 -m pip install --upgrade twine
      - name: Build pip package
        run: python3 -m build
      - run: ls dist
      - name: publish a package to pypi.org
        if: github.ref == 'refs/heads/main'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
